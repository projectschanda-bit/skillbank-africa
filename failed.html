<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkillBank Africa - Payment Failed</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#00210c",

                      "outline": "#aa8890",
                      "error": "#ffb4ab",
                      "on-secondary-container": "#a7b4ff",
                      "inverse-on-surface": "#322d46",
                      "error-container": "#93000a",
                      "on-secondary": "#00218d",
                      "surface-tint": "#ffb1c6",
                      "on-tertiary": "#00391a",
                      "on-surface-variant": "#e3bdc6",
                      "surface-container-lowest": "#0f0a22",
                      "on-tertiary-container": "#003116",
                      "background": "#141027",
                      "surface-dim": "#141027",
                      "secondary-container": "#0634c7",
                      "on-primary": "#650031",
                      "tertiary-fixed-dim": "#43e182",
                      "tertiary": "#43e182",
                      "on-primary-fixed-variant": "#8e0048",
                      "on-primary-fixed": "#3f001c",

                      "secondary": "#bac3ff",

                      "inverse-primary": "#ba0060",
                      "surface-bright": "#3b364f",
                      "primary-fixed-dim": "#ffb1c6",
                      "on-secondary-fixed-variant": "#0031c4",
                      "secondary-fixed-dim": "#bac3ff",
                      "on-error": "#690005",
                      "inverse-surface": "#e7deff",
                      "outline-variant": "#5a3f47",
                      "on-secondary-fixed": "#001159",
                      "on-background": "#e7deff",
                      "on-primary-container": "#59002a"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "24px",
                      "unit": "8px",
                      "section-gap": "64px",
                      "container-padding": "32px",
                      "max-width": "1200px"
              },
              "fontFamily": {
                      "sans": ["Inter", "sans-serif"],
                      "price-xl": ["Syne"],
                      "label-sm": ["Bricolage Grotesque"],

                      "display-lg-mobile": ["Syne"],

                      "display-lg": ["Syne"]

              "fontSize": {
                      "price-xl": ["36px", { "lineHeight": "1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                      "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                      "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }],
                      "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                      "display-lg-mobile": ["32px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                      "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],

<body class="text-on-surface font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden bg-[#08060f]">
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-error/10 blur-[150px] opacity-60 mix-blend-screen"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-error/5 blur-[120px] opacity-50 mix-blend-screen"></div>
    </div>
    <main class="flex-grow relative z-10 w-full max-w-lg mx-auto px-container-padding flex items-center justify-center min-h-screen">
        <div class="w-full relative">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[80%] bg-error/10 blur-[100px] rounded-full pointer-events-none z-0"></div>
            <div class="relative z-10 bg-white/[0.05] backdrop-blur-[24px] border border-white/10 rounded-2xl p-10 flex flex-col items-center justify-center text-center shadow-2xl shadow-black/50">
                <div class="w-20 h-20 bg-error/10 rounded-full flex items-center justify-center mb-8 relative">
                    <div class="absolute inset-0 bg-error/20 blur-xl rounded-full animate-pulse"></div>
                    <span class="material-symbols-outlined text-[40px] text-error relative z-10">error</span>
                </div>
                <h1 class="text-[32px] font-bold tracking-tight text-white mb-3">Transaction Failed</h1>
                <p class="text-[15px] font-normal leading-relaxed text-white/60 mb-10 max-w-sm">
                    We couldn't process your payment. This could be due to insufficient funds, a cancelled request, or a network timeout.
                </p>
                <div class="w-full space-y-4">
                    <button onclick="window.history.back()" class="w-full bg-white text-[#08060f] font-bold py-4 px-8 rounded-xl hover:bg-white/90 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                        <span class="material-symbols-outlined">refresh</span>
                        Try Again
                    </button>
                    <a href="index.html" class="w-full bg-white/5 text-white font-semibold py-4 px-8 rounded-xl border border-white/10 hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                        Return to Courses
                    </a>
                </div>
                <p class="mt-8 text-[12px] text-white/30">
                    If funds were deducted, please contact support with your reference ID: <span id="refDisplay" class="text-white/50">...</span>
                </p>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ref = localStorage.getItem('paymentRef') || 'N/A';
            document.getElementById('refDisplay').textContent = ref;
        });
    </script>
</body>
</html>
